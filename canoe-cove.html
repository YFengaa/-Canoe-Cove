    // 迁移旧的明文匿名墙数据到加密存储
    async function migrateLegacyWallData(password) {
      try {
        const legacyPosts = localStorage.getItem('canoe_user_wall_posts');
        const legacyLikes = localStorage.getItem('canoe_wall_likes');
        let migrated = false;

        if (legacyPosts) {
          const posts = JSON.parse(legacyPosts);
          if (posts.length > 0) {
            const data = await SecureStorage._loadEncrypted(password);
            // 合并，避免重复（以内容为键）
            const existingContents = new Set(data.wallPosts.map(p => p.content));
            for (const post of posts) {
              if (!existingContents.has(post.content)) {
                data.wallPosts.unshift(post);
              }
            }
            await SecureStorage._saveEncrypted(data, password);
            migrated = true;
          }
        }

        if (legacyLikes) {
          const likes = JSON.parse(legacyLikes);
          if (likes.length > 0) {
            const data = await SecureStorage._loadEncrypted(password);
            const existingLikes = new Set(data.wallLikes);
            for (const like of likes) {
              if (!existingLikes.has(like)) {
                data.wallLikes.push(like);
              }
            }
            await SecureStorage._saveEncrypted(data, password);
            migrated = true;
          }
        }

        if (migrated) {
          console.log('旧匿名墙数据已迁移到加密存储');
          // 迁移完成后删除明文数据
          localStorage.removeItem('canoe_user_wall_posts');
          localStorage.removeItem('canoe_wall_likes');
        }
      } catch (e) {
        console.warn('迁移旧匿名墙数据失败:', e);
      }
    }

    // ==================== 豆包 API 调用模块 ====================
    const DOUBAO_API_KEY = 'ark-5330ad05-9d94-4b02-81a4-f890e9eaef08-d42be';
    const DOUBAO_API_URL = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';
    const DOUBAO_MODEL = 'doubao-1-5-lite-32k-250115';

    async function callDoubao(messages) {
      const response = await fetch(DOUBAO_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${DOUBAO_API_KEY}`
        },
        body: JSON.stringify({
          model: DOUBAO_MODEL,
          messages: messages,
          temperature: 0.8,
          max_tokens: 500
        })
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      return data.choices[0].message.content;
    }

    const crisisKeywords = ['自杀', '自残', '绝望', '活不下去', '想死', '结束生命', '不想活了', '无助'];

    function detectCrisis(text) {
      return crisisKeywords.some(keyword => text.includes(keyword));
    }

    function showCrisisIntervention() {
      document.getElementById('crisisModal').classList.add('show');

    let memoryMessages = [];

    // ==================== 发送消息 ====================
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();

      if (!message) return;

      // 清空输入框
      input.value = '';

      // 保存用户消息（优先加密存储，否则内存兜底）
      const userMsg = { role: 'user', content: message };
      if (sessionPassword) {
        await SecureStorage.saveMessage(userMsg, sessionPassword);
      } else {
        memoryMessages.push(userMsg);
      }

      // 立即渲染用户消息（await 确保渲染完成）
      await renderMessages();

      // 检测极端情绪
      if (detectCrisis(message)) {
        setTimeout(() => showCrisisIntervention(), 500);
      }

      // 显示加载状态（在用户消息渲染完成后）
      showLoading();

      // 先尝试 API，失败则降级到离线
      let aiResponse = await tryCallAPI(message, currentEmotion);
      
      if (!aiResponse) {
        // API 失败，使用离线模拟（添加短延迟让用户感知到思考过程）
        console.log('[离线模式] 使用本地模拟回复');
        await new Promise(resolve => setTimeout(resolve, 300));
        aiResponse = getMockResponse(currentEmotion);
      }

      // 隐藏加载状态
      hideLoading();

      // 保存AI回复
      const aiMsg = { role: 'assistant', content: aiResponse };
      if (sessionPassword) {
        await SecureStorage.saveMessage(aiMsg, sessionPassword);
      } else {
        memoryMessages.push(aiMsg);
      }

      // 渲染消息
      await renderMessages();
    }

    // ==================== 渲染消息 ====================
    async function renderMessages() {
      const messagesContainer = document.getElementById('chatMessages');
      if (!messagesContainer) return;

      let messages = [];
      if (sessionPassword) {
        messages = await SecureStorage.getMessages(sessionPassword);
      } else {
        messages = memoryMessages;
      }

      if (messages.length === 0) {
        messagesContainer.innerHTML = `
          <div class="empty-state">
            <p>还没有对话记录～</p>
            <p>点击下方输入框，开始倾诉吧</p>
          </div>
        `;
      } else {
        messagesContainer.innerHTML = messages.map(msg => {
          if (msg.role === 'user') {
            return `
              <div class="message message-user">
                ${msg.content}
              </div>
            `;
          }
          
          const emotionMarker = '📊 情绪雷达：';
          const markerIndex = msg.content.indexOf(emotionMarker);
          
          if (markerIndex === -1) {
            return `
              <div class="message message-assistant">
                ${msg.content}
              </div>
            `;
          }
          
          const mainContent = msg.content.substring(0, markerIndex).trim();
          const emotionContent = msg.content.substring(markerIndex + emotionMarker.length).trim();
          
          return `
            <div class="message message-assistant">
              ${mainContent}
            </div>
            <div class="emotion-radar-card">
              <div class="emotion-radar-title">📊 情绪雷达</div>
              <div class="emotion-radar-content">${emotionContent}</div>
            </div>
          `;
        }).join('');
      }

      // 滚动到底部
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

      const now = Date.now();
      const diff = now - timestamp;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (minutes < 1) return '刚刚';
      if (minutes < 60) return minutes + '分钟前';
      if (hours < 24) return hours + '小时前';
      if (days < 7) return days + '天前';
      return '1周前';

    function startBreathing() {
      const modal = document.getElementById('breathingModal');
      const circle = document.getElementById('breathingCircle');
      const phaseText = document.getElementById('breathingPhaseText');
      const countText = document.getElementById('breathingCount');
      const actions = document.getElementById('breathingActions');

      clearBreathingTimeouts();

      modal.classList.add('show');
      actions.classList.remove('show');
      circle.className = 'breathing-circle';
      countText.textContent = `已完成 ${breathingCycle} / ${totalCycles} 个循环`;

      phaseText.textContent = '准备开始...';
      phaseText.classList.add('show');

      const startTimeout = setTimeout(() => {
        runBreathingCycle();
      }, 1000);
      breathingTimeouts.push(startTimeout);

    function runBreathingCycle() {
      if (!isBreathing) return;

      const circle = document.getElementById('breathingCircle');
      const phaseText = document.getElementById('breathingPhaseText');
      const countText = document.getElementById('breathingCount');

      if (!circle || !phaseText) return;

      phaseText.classList.remove('show');

      const t1 = setTimeout(() => {
        phaseText.textContent = '吸气...';
        phaseText.classList.add('show');
        circle.className = 'breathing-circle inhale';
      }, 300);
      breathingTimeouts.push(t1);

      const t2 = setTimeout(() => {
        phaseText.classList.remove('show');
        const t2inner = setTimeout(() => {
          phaseText.textContent = '屏住...';
          phaseText.classList.add('show');
          circle.className = 'breathing-circle hold';
        }, 300);
        breathingTimeouts.push(t2inner);
      }, 4000);
      breathingTimeouts.push(t2);

      const t3 = setTimeout(() => {
        phaseText.classList.remove('show');
        const t3inner = setTimeout(() => {
          phaseText.textContent = '呼气...';
          phaseText.classList.add('show');
          circle.className = 'breathing-circle exhale';
        }, 300);
        breathingTimeouts.push(t3inner);
      }, 8000);
      breathingTimeouts.push(t3);

      const t4 = setTimeout(() => {
        breathingCycle++;
        if (countText) {
          countText.textContent = `已完成 ${breathingCycle} / ${totalCycles} 个循环`;
        }

        if (breathingCycle >= totalCycles) {
          finishBreathing();
        } else {
          runBreathingCycle();
        }
      }, 12000);
      breathingTimeouts.push(t4);
    }

    function finishBreathing() {
      const phaseText = document.getElementById('breathingPhaseText');

      if (phaseText) {

    function continueBreathing() {

    async function renderCalendar() {
      const app = document.getElementById('app');
      const events = sessionPassword ? await SecureStorage.getCalendarEvents(sessionPassword) : [];
      const monthMoods = sessionPassword ? await SecureStorage.getMonthMoods(calendarCurrentDate.getFullYear(), calendarCurrentDate.getMonth(), sessionPassword) : [];

      const year = calendarCurrentDate.getFullYear();
      const month = calendarCurrentDate.getMonth();
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      // 当月第一天
      const firstDay = new Date(year, month, 1);
      // 当月最后一天
      const lastDay = new Date(year, month + 1, 0);
      // 第一天是周几（0=周日）
      const firstDayOfWeek = firstDay.getDay();
      // 当月天数
      const daysInMonth = lastDay.getDate();

      // 上个月的最后几天
      const prevMonthLastDay = new Date(year, month, 0).getDate();

      // 生成日历天数数组
      const days = [];

      // 上个月的日期
      for (let i = firstDayOfWeek - 1; i >= 0; i--) {
        days.push({
          day: prevMonthLastDay - i,
          month: month - 1,
          year: month === 0 ? year - 1 : year,
          otherMonth: true
        });

    // ==================== 提醒功能 ====================

    async function checkReminders() {
      if (!sessionPassword) return;

      try {
        const events = await SecureStorage.getCalendarEvents(sessionPassword);
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        const nowTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        for (const evt of events) {
          if (evt.reminded) continue;
          if (evt.date !== todayStr) continue;

          // 如果没有设置时间，当天0点就提醒
          // 如果设置了时间，到时间才提醒
          let shouldRemind = false;
          if (!evt.time) {
            // 全天提醒，早上8点之后就提醒
            if (now.getHours() >= 8) {
              shouldRemind = true;
            }
          } else {
            if (nowTime >= evt.time) {
              shouldRemind = true;
            }
          }

          if (shouldRemind) {
            showReminderModal(evt);
            await SecureStorage.updateCalendarEvent(evt.id, { reminded: true }, sessionPassword);
          }
        }
      } catch (e) {
        console.warn('检查提醒失败:', e);
      }
    }

    // ==================== 明信片页渲染 ====================
    function renderPostcard() {
      const app = document.getElementById('app');

      app.innerHTML = `
        <div class="page">
          <div class="postcard-header">
            <h2>治愈明信片生成器</h2>
            <p>输入心情关键词，生成专属治愈短句和插画</p>
          </div>

          <div class="postcard-input-area">
            <input type="text" class="keyword-input" id="keywordInput" placeholder="例如：温暖、希望、勇气..." maxlength="20">
            <button class="btn generate-btn" onclick="generatePostcard()">生成明信片</button>
          </div>

          <div class="postcard-result" id="postcardResult" style="display: none;">
          </div>
        </div>
      `;
    }

    const fallbackTexts = [
      '每一个小小的努力，都在悄悄改变未来～',
      '你比想象中更勇敢，比看起来更坚强～',
      '慢慢来，比较快～',
      '今天的你，已经很棒了～'
    ];

    const postcardColors = ['#7FBEAB', '#F5E6D3', '#E8E0F0', '#FFE5E5', '#E5F0FF'];
    let currentPostcardImage = null;
    let currentPostcardText = null;

    function downloadPostcard() {
      if (!currentPostcardImage || !currentPostcardText) {
        alert('请先生成明信片～');
        return;
      }

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 600;
      canvas.height = 800;

      const img = new Image();
      img.crossOrigin = 'anonymous';

      img.onload = function() {
        drawPostcard(ctx, canvas.width, canvas.height, img, currentPostcardText);
        triggerDownload(canvas);
      };

      img.onerror = function() {
        drawGradientBackground(ctx, canvas.width, canvas.height);
        drawPostcardContent(ctx, canvas.width, canvas.height, currentPostcardText);
        triggerDownload(canvas);
      };

      img.src = currentPostcardImage;
    }

    function drawPostcard(ctx, w, h, img, text) {
      const imgRatio = img.width / img.height;
      const canvasRatio = w / h;
      let sx, sy, sw, sh;

      if (imgRatio > canvasRatio) {
        sh = img.height;
        sw = img.height * canvasRatio;
        sx = (img.width - sw) / 2;
        sy = 0;
      } else {
        sw = img.width;
        sh = img.width / canvasRatio;
        sx = 0;
        sy = (img.height - sh) / 2;
      }

      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
      drawPostcardContent(ctx, w, h, text);
    }

    function drawGradientBackground(ctx, w, h) {
      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, '#A8D5C3');
      gradient.addColorStop(0.5, '#7FBEAB');
      gradient.addColorStop(1, '#5B8C7B');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);
    }

    function drawPostcardContent(ctx, w, h, text) {
      const maskHeight = 150;
      const maskY = h - maskHeight;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, maskY, w, maskHeight);

      ctx.fillStyle = '#ffffff';
      ctx.font = '20px "Noto Serif SC", "Songti SC", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const lineHeight = 30;
      const maxWidth = w - 80;
      const lines = wrapText(ctx, text, maxWidth);
      const totalTextHeight = lines.length * lineHeight;
      const textY = maskY + (maskHeight - totalTextHeight) / 2 + lineHeight / 2;

      lines.forEach((line, index) => {
        ctx.fillText(line, w / 2, textY + index * lineHeight - (lines.length - 1) * lineHeight / 2);
      });

      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.font = '14px "Noto Sans SC", "PingFang SC", sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText('轻舟树洞', w - 20, h - 15);
    }

    function wrapText(ctx, text, maxWidth) {
      const chars = text.split('');
      const lines = [];
      let currentLine = '';

      for (let i = 0; i < chars.length; i++) {
        const testLine = currentLine + chars[i];
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && currentLine !== '') {
          lines.push(currentLine);
          currentLine = chars[i];
        } else {
          currentLine = testLine;
        }
      }

      if (currentLine) {
        lines.push(currentLine);
      }

      return lines;
    }

    function triggerDownload(canvas) {
      canvas.toBlob(function(blob) {
        if (!blob) {
          alert('图片生成失败，请重试');
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        const dateStr = now.getFullYear().toString() +
          (now.getMonth() + 1).toString().padStart(2, '0') +
          now.getDate().toString().padStart(2, '0');
        a.download = '轻舟树洞-明信片-' + dateStr + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    function createPostcardCanvas() {
      return new Promise(function(resolve, reject) {
        if (!currentPostcardImage || !currentPostcardText) {
          reject(new Error('请先生成明信片'));
          return;
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 800;

        const img = new Image();
        img.crossOrigin = 'anonymous';

        img.onload = function() {
          drawPostcard(ctx, canvas.width, canvas.height, img, currentPostcardText);
          resolve(canvas);
        };

        img.onerror = function() {
          drawGradientBackground(ctx, canvas.width, canvas.height);
          drawPostcardContent(ctx, canvas.width, canvas.height, currentPostcardText);
          resolve(canvas);
        };

        img.src = currentPostcardImage;
      });
    }

    function showToast(message) {
      let toast = document.querySelector('.toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(function() {
        toast.classList.remove('show');
      }, 2000);
    }

    async function sharePostcard() {
      if (!currentPostcardImage || !currentPostcardText) {
        alert('请先生成明信片～');
        return;
      }

      try {
        const canvas = await createPostcardCanvas();
        const blob = await new Promise(function(resolve, reject) {
          canvas.toBlob(function(b) {
            if (b) resolve(b);
            else reject(new Error('图片生成失败'));
          }, 'image/png');
        });

        if (navigator.share && navigator.canShare) {
          const file = new File([blob], '轻舟树洞-明信片.png', { type: 'image/png' });
          const shareData = {
            title: '轻舟树洞明信片',
            text: currentPostcardText,
            files: [file]
          };

          if (navigator.canShare(shareData)) {
            try {
              await navigator.share(shareData);
              return;
            } catch (err) {
              if (err.name === 'AbortError') {
                return;
              }
            }
          }

          try {
            await navigator.share({
              title: '轻舟树洞明信片',
              text: currentPostcardText
            });
            return;
          } catch (err) {
            if (err.name === 'AbortError') {
              return;
            }
          }
        }

        if (navigator.clipboard && window.ClipboardItem) {
          try {
            await navigator.clipboard.write([
              new ClipboardItem({ 'image/png': blob })
            ]);
            showToast('图片已复制到剪贴板，可粘贴到聊天框分享');
            return;
          } catch (err) {
          }
        }

        downloadPostcard();
      } catch (err) {
        downloadPostcard();
      }
    }

    function generateDefaultImage(keyword) {
      const color = postcardColors[Math.floor(Math.random() * postcardColors.length)];
      const svg = `

    // ==================== 尝试 TRAE 生成短句 ====================
    async function tryTRAEText(keyword) {
      if (typeof window.trae_chat !== 'function') {
        console.warn('[TRAE 短句] 不可用');
        return null;
      }
      try {
        const prompt = `请根据关键词"${keyword}"生成一句温暖治愈的短句（30字以内），适合写在明信片上。只返回短句，不要其他内容。`;
        const result = await window.trae_chat(prompt, '');
        if (result && result.trim()) {
          console.log('[TRAE 短句] 成功');
          return result.trim();
        }
        return null;
      } catch (error) {
        console.warn('[TRAE 短句] 失败:', error.message);
        return null;
      }
    }

    // ==================== 豆包文生图 ====================
    const DOUBAO_IMAGE_MODEL = 'doubao-seedream-5-0-260128';

    async function tryDoubaoImage(keyword) {
      try {
        const prompt = `${keyword}主题，柔和治愈系插画，温暖色调，简约风格，水彩质感，适合青少年`;
        const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/images/generations', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${DOUBAO_API_KEY}`
          },
          body: JSON.stringify({
            model: DOUBAO_IMAGE_MODEL,
            prompt: prompt,
            response_format: 'url',
            size: '2K',
            watermark: false
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (data.data && data.data[0] && data.data[0].url) {
          console.log('[豆包文生图] 成功');
          return data.data[0].url;
        }
        return null;
      } catch (error) {
        console.warn('[豆包文生图] 失败:', error.message);
        return null;
      }
    }

    function parseMarkdown(md) {
      const lines = md.split('\n');
      let html = '';
      let inList = false;

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();

        if (line === '') {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          continue;
        }

        if (line === '---') {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += '<hr style="border: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(127, 190, 171, 0.3), transparent); margin: 20px 0;">';
          continue;
        }

        if (line.startsWith('# ')) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += '<h1 style="font-size: 22px; font-weight: 700; color: var(--text-dark); margin: 0 0 16px 0;">' + parseInline(line.slice(2)) + '</h1>';
          continue;
        }

        if (line.startsWith('## ')) {
          if (inList) {
            html += '</ul>';
            inList = false;
          }
          html += '<h2 style="font-size: 17px; font-weight: 600; color: var(--text-dark); margin: 24px 0 12px 0;">' + parseInline(line.slice(3)) + '</h2>';
          continue;
        }

        if (line.startsWith('- ')) {
          if (!inList) {
            html += '<ul style="margin: 8px 0; padding-left: 20px; color: var(--text-muted); font-size: 14px; line-height: 1.8;">';
            inList = true;
          }
          html += '<li>' + parseInline(line.slice(2)) + '</li>';
          continue;
        }

        if (inList) {
          html += '</ul>';
          inList = false;
        }

        if (line.startsWith('*') && line.endsWith('*') && line.length > 2) {
          html += '<p style="color: var(--text-muted); font-size: 13px; font-style: italic; text-align: center; margin: 16px 0;">' + parseInline(line.slice(1, -1)) + '</p>';
        } else {
          html += '<p style="color: var(--text-dark); font-size: 14px; line-height: 1.8; margin: 8px 0;">' + parseInline(line) + '</p>';
        }
      }

      if (inList) {
        html += '</ul>';
      }

      return html;
    }

    function parseInline(text) {
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong style="color: var(--text-dark);">$1</strong>');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer" style="color: var(--primary); text-decoration: none; border-bottom: 1px solid rgba(127, 190, 171, 0.3);">$1</a>');
      return text;
    }

      if (confirm('确定要退出登录吗？')) {
        UserAuth.logout();
        sessionPassword = null;
        navigateTo('login');
      }
    }

    function setTheme(theme) {
      ThemeManager.setTheme(theme);
      if (currentPage === 'settings') {
        updateThemeButtons(theme);
      }
    }

    function updateThemeButtons(theme) {
      const buttons = ['light', 'dark', 'auto'];
      buttons.forEach(t => {
        const btn = document.getElementById('theme-' + t);
        if (btn) {
          if (t === theme) {
            btn.style.borderColor = 'var(--primary)';
            btn.style.background = 'rgba(127, 190, 171, 0.1)';
          } else {
            btn.style.borderColor = 'rgba(127, 190, 171, 0.2)';
            btn.style.background = 'var(--gradient-card)';
          }
        }
      });
    }

    // ==================== 字体大小管理模块 ====================
    const FontScaleManager = {
      getCurrentScale() {
        const saved = localStorage.getItem('canoe_font_scale');
        return saved ? parseFloat(saved) : 1.0;
      },

      applyScale(scale) {
        document.documentElement.style.setProperty('--font-scale', scale);
      },

      init() {
        this.applyScale(this.getCurrentScale());
      }
    };

    function changeFontScale(scale) {
      localStorage.setItem('canoe_font_scale', scale.toString());
      FontScaleManager.applyScale(scale);
      if (currentPage === 'settings') {
        updateFontScaleButtons(scale);
      }
    }

    function updateFontScaleButtons(scale) {
      const scales = { small: 0.9, normal: 1.0, large: 1.15 };
      Object.keys(scales).forEach(key => {
        const btn = document.getElementById('fontscale-' + key);
        if (btn) {
          if (Math.abs(scales[key] - scale) < 0.001) {
            btn.style.borderColor = 'var(--primary)';
            btn.style.background = 'rgba(127, 190, 171, 0.1)';
          } else {
            btn.style.borderColor = 'rgba(127, 190, 171, 0.2)';
            btn.style.background = 'var(--gradient-card)';
          }
        }
      });
    }

    // ==================== 云端同步操作 ====================
    async function syncToCloud() {
      const statusEl = document.getElementById('syncStatus');
      if (statusEl) statusEl.textContent = '正在同步到云端...';

      if (!CloudSync.init()) {
        if (statusEl) statusEl.textContent = '❌ 云端同步未配置';
        return;
      }

      const signInResult = await CloudSync.anonymousSignIn();
      if (!signInResult.user) {
        if (statusEl) statusEl.textContent = '❌ 登录失败：' + signInResult.error;
        return;
      }

      const result = await CloudSync.upload();
      if (result.success) {
        if (statusEl) statusEl.textContent = '✅ 同步成功！';
      } else {
        if (statusEl) statusEl.textContent = '❌ 同步失败：' + result.error;
      }
    }

    async function syncFromCloud() {
      const statusEl = document.getElementById('syncStatus');
      if (statusEl) statusEl.textContent = '正在从云端恢复...';

      if (!CloudSync.init()) {
        if (statusEl) statusEl.textContent = '❌ 云端同步未配置';
        return;
      }

      const signInResult = await CloudSync.anonymousSignIn();
      if (!signInResult.user) {
        if (statusEl) statusEl.textContent = '❌ 登录失败：' + signInResult.error;
        return;
      }

      const result = await CloudSync.download();
      if (result.success && result.bundle) {
        // 验证能否用当前密码解密
        try {
          const testBundle = {
            data: result.bundle.data,
            salt: result.bundle.salt,
            iv: result.bundle.iv
          };
          await CryptoVault.decrypt(testBundle, sessionPassword);

          // 解密成功，保存到本地
          SecureStorage.setEncryptedBundle(JSON.stringify(result.bundle));
          if (statusEl) statusEl.textContent = '✅ 恢复成功！请刷新页面。';
        } catch (e) {
          if (statusEl) statusEl.textContent = '❌ 密码不匹配，无法解密云端数据';
        }
      } else {
        if (statusEl) statusEl.textContent = '❌ 恢复失败：' + result.error;
      }
    }

    function formatDateTime(timestamp) {
      const d = new Date(timestamp);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function stripEmotionRadar(content) {
      const marker = '📊 情绪雷达：';
      const index = content.indexOf(marker);
      if (index === -1) return content;
      return content.substring(0, index).trim();
    }

    async function exportMyData() {
      if (!sessionPassword) {
        alert('请先登录后再导出数据');
        return;
      }

      try {
        const messages = await SecureStorage.getMessages(sessionPassword);
        const wallPosts = await SecureStorage.getWallPosts(sessionPassword);
        const data = await SecureStorage._loadEncrypted(sessionPassword);
        const moodRecords = data.moodRecords || {};

        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        const exportTime = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        const fileDate = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}`;

        let content = '';
        content += '========================================\n';
        content += '轻舟树洞 - 我的记录\n';
        content += `导出时间：${exportTime}\n`;
        content += '========================================\n\n';

        content += '【树洞对话记录】\n';
        if (messages.length === 0) {
          content += '暂无记录\n';
        } else {
          const sortedMessages = [...messages].sort((a, b) => a.timestamp - b.timestamp);
          for (const msg of sortedMessages) {
            const dateTime = formatDateTime(msg.timestamp);
            const role = msg.role === 'user' ? '我' : '树洞';
            let text = msg.content || '';
            if (msg.role === 'assistant') {
              text = stripEmotionRadar(text);
            }
            content += `${dateTime} [${role}]：${text}\n`;
          }
        }
        content += '\n========================================\n\n';

        content += '【匿名墙发帖】\n';
        if (wallPosts.length === 0) {
          content += '暂无记录\n';
        } else {
          const sortedPosts = [...wallPosts].sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
          for (const post of sortedPosts) {
            const dateTime = post.timestamp ? formatDateTime(post.timestamp) : (post.date || '未知时间');
            const emotion = post.emotion || '未知';
            const text = post.content || post.text || '';
            content += `${dateTime} [${emotion}]：${text}\n`;
          }
        }
        content += '\n========================================\n\n';

        content += '【心情日记】\n';
        const moodDates = Object.keys(moodRecords).sort();
        if (moodDates.length === 0) {
          content += '暂无记录\n';
        } else {
          for (const date of moodDates) {
            const record = moodRecords[date];
            const mood = record.mood || '未知';
            const note = record.note || '';
            if (note) {
              content += `${date} [${mood}]：${note}\n`;
            } else {
              content += `${date} [${mood}]\n`;
            }
          }
        }

        const blob = new Blob(['\uFEFF' + content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `轻舟树洞-我的记录-${fileDate}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showToast('导出成功');
      } catch (e) {
        console.error('导出失败:', e);
        alert('导出失败：' + (e.message || '未知错误'));
      }
    }

    async function deleteAccount() {
      if (!confirm('确定要注销账号吗？\n\n这将永久删除：\n• 你的账号信息\n• 所有对话记录\n• 日历提醒\n• 匿名墙发布和点赞\n\n此操作无法撤销！')) {
        return;
      }

      const user = UserAuth.getCurrentUser();
      if (!user) {
        alert('未登录');
        return;
      }

      try {
        // 删除云端用户数据
        const client = UserAuth._getClient();
        if (client) {
          // 删除用户加密数据
          try {
            await client.from('user_vaults').delete().eq('user_id', user.id);
          } catch (e) {
            console.warn('删除云端数据失败:', e);
          }

          // 删除用户账号
          try {
            const { error } = await client.from('users').delete().eq('id', user.id);
            if (error) throw error;
          } catch (e) {
            console.warn('删除云端用户失败:', e);
            // 即使云端删除失败，也要清除本地
          }
        }

        // 清除本地所有数据
        await SecureStorage.clearAllData();
        UserAuth.logout();
        sessionPassword = null;

        alert('账号已注销，再见～');
        navigateTo('register');
      } catch (e) {
        console.error('注销失败:', e);
        alert('注销失败：' + (e.message || '未知错误'));
      }
    }
  </script>
